; ============================================================
; SQL Server Express - Instalacion desatendida
; Se pasa a setup.exe con /ConfigurationFile=ConfigurationFile.ini
; La contrasena SA se pasa aparte por /SAPWD (no se deja en el ini).
; ============================================================

[OPTIONS]
ACTION="Install"
FEATURES=SQLENGINE
INSTANCENAME="SQLEXPRESS"
INSTANCEID="SQLEXPRESS"

; Cuentas de servicio
SQLSVCACCOUNT="NT AUTHORITY\SYSTEM"
SQLSVCSTARTUPTYPE="Automatic"
AGTSVCSTARTUPTYPE="Disabled"

; Modo mixto: Windows + SQL Auth
SECURITYMODE="SQL"

; El admin local queda como sysadmin
SQLSYSADMINACCOUNTS="BUILTIN\Administrators"

; Red: habilita TCP desde la instalacion
TCPENABLED="1"
NPENABLED="0"

; Silencioso con barra de progreso, sin interaccion
QUIETSIMPLE="True"
UpdateEnabled="False"
IACCEPTSQLSERVERLICENSETERMS="True"
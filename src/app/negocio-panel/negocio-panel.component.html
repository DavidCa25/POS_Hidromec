<div class="panel-content">

  <div class="section-title"><i class="bi bi-shop"></i> Datos del negocio</div>

  <div class="row two">
    <div>
      <label class="lbl">Nombre del negocio</label>
      <input class="ctl" type="text" [(ngModel)]="form.business_name" placeholder="Mi Tienda" [disabled]="cargando">
    </div>
    <div>
      <label class="lbl">RFC</label>
      <input class="ctl" type="text" [(ngModel)]="form.rfc" placeholder="XAXX010101000" style="text-transform:uppercase;" [disabled]="cargando">
    </div>
  </div>

  <div class="row two">
    <div>
      <label class="lbl">Teléfono</label>
      <input class="ctl" type="text" [(ngModel)]="form.phone" placeholder="55 1234 5678" [disabled]="cargando">
    </div>
    <div>
      <label class="lbl">Dirección</label>
      <input class="ctl" type="text" [(ngModel)]="form.address" placeholder="Calle, número, colonia" [disabled]="cargando">
    </div>
  </div>

  <div class="section-title" style="margin-top:1.5rem;"><i class="bi bi-receipt"></i> Ticket</div>

  <div class="row">
    <div>
      <label class="lbl">Pie de página del ticket</label>
      <input class="ctl" type="text" [(ngModel)]="form.ticket_footer" placeholder="¡Gracias por su compra!" [disabled]="cargando">
      <div class="hint">Aparece al final de cada ticket de venta.</div>
    </div>
  </div>

  <div class="btn-row" style="justify-content:flex-end; margin-top:2rem;">
    <button class="btn-primary" type="button" (click)="save()" [disabled]="guardando || cargando">
      <i class="bi bi-check2-circle"></i> {{ guardando ? 'Guardando...' : 'Guardar cambios' }}
    </button>
  </div>

</div>
